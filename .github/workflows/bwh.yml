name: BWH Stock Monitor

# 触发条件
on:
  schedule:
    # 自动定时运行：每 5 分钟执行一次 (GitHub Actions 的最小间隔通常是 5 分钟左右)
    # 注：GitHub 的 cron 采用 UTC 时间，*/5 * * * * 代表每 5 分钟触发一次
    - cron: '*/5 * * * *'
  
  # 保留手动触发按钮（就是你截图里的“运行工作流”按钮）
  workflow_dispatch:

# 限制并发：如果上一次任务还没跑完（卡住了），新任务启动时会自动取消上一次的任务，防止额度浪费和卡死
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取你仓库里的 Python 代码
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 2. 安装 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 缓存 Python 依赖（这能让每次运行缩短至几秒钟，避免每次重复下载 requests）
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. 安装必要的第三方库
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      # 5. 执行监控脚本并注入 PushDeer 的 PUSH_KEY
      - name: Run Stock Monitor Script
        env:
          # 绑定你在 GitHub Secrets 里配置的密钥
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
        run: |
          python monitor.py
