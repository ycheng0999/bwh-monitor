name: BWH Stock Monitor

on:
  schedule:
    # 北京时间每天 0点、5点、10点、15点、20点 自动接班启动
    - cron: '0 */5 * * *'
  workflow_dispatch: 

jobs:
  check:
    runs-on: ubuntu-latest
    # 允许单次任务最长跑 6 小时（360分钟）
    timeout-minutes: 360
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install requests

    - name: Run Monitor
      env:
        PUSH_KEY: ${{ secrets.PUSH_KEY }}
      run: python monitor.py
