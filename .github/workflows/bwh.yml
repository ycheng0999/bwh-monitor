name: BWH Stock Monitor

on:
  schedule:
    # 每 10 分钟自动运行一次
    - cron: '*/10 * * * *'
  workflow_dispatch: 

jobs:
  check:
    runs-on: ubuntu-latest
    # 如果这个任务运行超过 2 分钟，GitHub 会无条件强行杀掉进程，物理防卡死
    timeout-minutes: 2
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install requests

    - name: Run Monitor
      env:
        PUSH_KEY: ${{ secrets.PUSH_KEY }}
      run: python monitor.py
