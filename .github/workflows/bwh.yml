name: BWH Stock Monitor

on:
  schedule:
    # 尝试调整为 GitHub 支持的最高免费频率（每 5 分钟）
    - cron: '*/5 * * * *'
  workflow_dispatch: 

jobs:
  check:
    runs-on: ubuntu-latest
    # 限制单次运行最多只能跑 2 分钟，超时强制中断，防止卡死
    timeout-minutes: 2
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install requests

    - name: Run Monitor
      env:
        PUSH_KEY: ${{ secrets.PUSH_KEY }}
      run: python monitor.py
