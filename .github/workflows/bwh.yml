name: BWH Stock Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: 

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install requests

    - name: Run Monitor
      env:
        PUSH_KEY: ${{ secrets.PUSH_KEY }}
      run: python monitor.py
